url: https://lxiao06.github.io/ASAP/
development:
  mode: auto
template:
  bootstrap: 5
  bslib:
    primary: "#1e88e5"
    link-color: "#1e88e5"
  assets: pkgdown/

repo:
  url:
    home: https://github.com/LXiao06/ASAP
    source: https://github.com/LXiao06/ASAP/blob/HEAD/
    issue: https://github.com/LXiao06/ASAP/issues/
    user: https://github.com/LXiao06/

navbar:
  structure:
    left:  [intro, installation, get_started, reference, news]
    right: [search, github]
  components:
    installation:
      text: "Installation"
      href: articles/installation.html
    get_started:
      text: "Get Started"
      href: articles/index.html

articles:
  - title: ~
    contents:
      - index

  - title: "Installation Guide"
    desc: "How to install R, RStudio, and ASAP"
    contents:
      - installation

  - title: "Single WAV File Analysis"
    desc: "Learn ASAP functions using individual audio files"
    contents:
      - single_wav_analysis
      - motif_detection
      - acoustic_feature_analysis
      - advanced_acoustic_feature_analysis

  - title: "Longitudinal Recording Analysis with SAP Object"
    desc: "Batch processing of recordings across developmental time points"
    contents:
      - construct_sap_object
      - longitudinal_motif_detection
      - longitudinal_bout_detection
      - exporting_song_clips
      - longitudinal_syllable_segmentation
      - syllable_labeling

reference:
  - title: "Object Construction"
    desc: "Functions for creating and writing the core SAP object"
    contents:
      - create_sap_object
      - create_sap_metadata

  - title: "Curated Song Export"
    desc: "Functions for exporting user-choice audio clips, bouts, and motifs."
    contents:
      - create_audio_clip
      - create_motif_clips
      - create_bout_clips

  - title: "Detection & Segmentation"
    desc: "Functions for finding bouts, motifs and segmenting syllables"
    contents:
      - find_bout
      - find_motif
      - refine_motif_boundaries
      - segment

  - title: "Template Matching"
    desc: "Functions for establishing and detecting specific acoustic templates"
    contents:
      - create_template
      - detect_template

  - title: "Feature Extraction & Clustering"
    desc: "Functions to extract acoustic features (FF, goodness, etc) and cluster segments"
    contents:
      - extract_spec
      - analyze_spectral
      - FF
      - goodness
      - spectral_entropy
      - find_clusters
      - amp_env
      - refine_FF
      - refine_sh

  - title: "Dimensionality Reduction"
    desc: "Functions dedicated to reducing acoustic parameter dimensionality"
    contents:
      - run_pca
      - run_umap
      - create_trajectory_matrix

  - title: "Plotting & Visualization"
    desc: "Plotting functionality for exploring ASAP objects"
    contents:
      - plot_traces
      - plot_clusters
      - plot_heatmap
      - plot_umap
      - plot_umap2
      - plot_motif_boundaries
      - visualize_song
      - visualize_segments
      
  - title: "Labeling"
    desc: "Functions for annotating clustered syllables"
    contents:
      - auto_label
      - manual_label

  - title: "Utilities"
    desc: "Various utility functions for working with ASAP objects and audio files."
    contents:
      - compute_wav_durations
      - denoise
      - get_wav_indices
      - list_numeric_dirs
      - anova_analysis
