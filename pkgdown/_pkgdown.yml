url: https://lxiao06.github.io/ASAP/
template:
  bootstrap: 5
  bslib:
    primary: "#1e88e5"
    link-color: "#1e88e5"
  assets: pkgdown/

repo:
  url:
    home: https://github.com/LXiao06/ASAP
    source: https://github.com/LXiao06/ASAP/blob/HEAD/
    issue: https://github.com/LXiao06/ASAP/issues/
    user: https://github.com/LXiao06/

navbar:
  structure:
    left:  [intro, get_started, reference, news]
    right: [search, github]
  components:
    get_started:
      text: "Get Started"
      href: articles/index.html

articles:
  - title: ~
    contents:
      - index

  - title: "Single WAV File Analysis"
    desc: "Learn ASAP functions using individual audio files"
    contents:
      - single_wav_analysis
      - motif_detection

  - title: "Longitudinal Recording Analysis with SAP Object"
    desc: "Batch processing of recordings across developmental time points"
    contents:
      - construct_sap_object
      - longitudinal_motif_detection
      - longitudinal_bout_detection
      - longitudinal_syllable_segmentation
      - syllable_labeling

reference:
  - title: "Object Construction"
    desc: "Functions for creating and writing the core SAP object and handling audio clips"
    contents:
      - create_sap_object
      - create_audio_clip
      - parse_filename
      - validate_sap

  - title: "Detection & Segmentation"
    desc: "Functions for finding bouts, motives and segmenting syllables"
    contents:
      - find_bout
      - find_motif
      - segment
      - filter_short_segments
      - as_segment

  - title: "Template Matching"
    desc: "Functions for establishing and detecting specific acoustic templates"
    contents:
      - create_template
      - detect_template

  - title: "Feature Extraction & Clustering"
    desc: "Functions to extract acoustic features (FF, goodness, etc) and cluster segments"
    contents:
      - extract_spec
      - analyze_spectral
      - calculate_freq_metrics
      - FF
      - goodness
      - spectral_entropy
      - find_clusters

  - title: "Dimensionality Reduction"
    desc: "Functions dedicated to reducing acoustic parameter dimensionality"
    contents:
      - run_pca
      - run_umap
      - create_trajectory_matrix

  - title: "Plotting & Visualization"
    desc: "Plotting functionality for exploring ASAP objects"
    contents:
      - plot_traces
      - plot_clusters
      - plot_heatmap
      - plot_umap
      - plot_umap2
      - visualize_song
      - visualize_segments
      
  - title: "Labeling"
    desc: "Functions for annotating clustered syllables"
    contents:
      - auto_label
      - manual_label
